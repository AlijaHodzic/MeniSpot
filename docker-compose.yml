services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: digital_menu
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - digital-menu-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d digital_menu"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  digital-menu-postgres:
